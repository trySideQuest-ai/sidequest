name: Feature request
description: Suggest a feature or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What pain point does this address? (Skip the solution for now — describe the problem.)
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: What would solve it?
      description: Your proposed feature, command, or change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Anything you've tried already?
      description: Workarounds, related skills/commands, similar projects.
    validations:
      required: false
