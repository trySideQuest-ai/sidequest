name: Release App

on:
  push:
    tags:
      - 'app-v*'

env:
  AWS_REGION: us-east-1
  S3_BUCKET: sidequest-releases
  DISTRIBUTION_ID: E2J2MF0TAZ6G7F

jobs:
  release:
    runs-on: macos-14
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/app-v}" >> $GITHUB_ENV

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Build app (ad-hoc signing)
        run: |
          cd macOS
          xcodebuild -scheme SideQuestApp \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            build

          APP_PATH="build/DerivedData/Build/Products/Release/SideQuestApp.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            exit 1
          fi
          echo "App built successfully: $APP_PATH"

      - name: Create DMG
        run: |
          cd macOS
          APP_PATH="build/DerivedData/Build/Products/Release/SideQuestApp.app"
          bash scripts/create-dmg.sh "$APP_PATH" "SideQuestApp-${{ env.VERSION }}.dmg"

          if [ ! -f "SideQuestApp-${{ env.VERSION }}.dmg" ]; then
            echo "Error: DMG not created"
            exit 1
          fi
          cp "SideQuestApp-${{ env.VERSION }}.dmg" "SideQuestApp-latest.dmg"
          echo "DMG created: SideQuestApp-${{ env.VERSION }}.dmg"

      - name: Move DMGs to repo root for upload
        run: |
          mv macOS/SideQuestApp-${{ env.VERSION }}.dmg .
          mv macOS/SideQuestApp-latest.dmg .
          ls -lh SideQuestApp-*.dmg

      - name: Calculate SHA256
        run: |
          SHA256=$(shasum -a 256 SideQuestApp-${{ env.VERSION }}.dmg | cut -d' ' -f1)
          echo "APP_SHA256=$SHA256" >> $GITHUB_ENV
          echo "SHA256: $SHA256"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-sidequest-releases
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload versioned DMG to S3
        run: |
          aws s3 cp SideQuestApp-${{ env.VERSION }}.dmg \
            s3://${S3_BUCKET}/SideQuestApp-${{ env.VERSION }}.dmg \
            --content-type application/x-apple-diskimage
          aws s3 cp SideQuestApp-latest.dmg \
            s3://${S3_BUCKET}/SideQuestApp-latest.dmg \
            --content-type application/x-apple-diskimage
          echo "Uploaded versioned + latest DMG"

      - name: Update remote-config.json with new app version
        run: |
          aws s3 cp s3://${S3_BUCKET}/config.json /tmp/config.json 2>/dev/null || echo '{}' > /tmp/config.json
          python3 - <<PYEOF
          import json
          try:
              with open('/tmp/config.json') as f:
                  cfg = json.load(f)
          except Exception:
              cfg = {}
          cfg['app_version'] = '${{ env.VERSION }}'
          cfg['app_sha256'] = '${{ env.APP_SHA256 }}'
          cfg['app_dmg_url'] = 'https://get.trysidequest.ai/SideQuestApp-${{ env.VERSION }}.dmg'
          with open('/tmp/config.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          print(json.dumps(cfg, indent=2))
          PYEOF
          aws s3 cp /tmp/config.json s3://${S3_BUCKET}/config.json \
            --content-type application/json

      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ env.DISTRIBUTION_ID }}" \
            --paths "/SideQuestApp-*.dmg" "/config.json" "/install.sh" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"
          TIMEOUT=300
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws cloudfront get-invalidation \
              --distribution-id "${{ env.DISTRIBUTION_ID }}" \
              --id "$INVALIDATION_ID" \
              --query 'Invalidation.Status' \
              --output text)
            if [ "$STATUS" = "Completed" ]; then
              echo "CloudFront invalidation completed"
              exit 0
            fi
            echo "Invalidation status: $STATUS (waiting...)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          echo "CloudFront invalidation polling timeout"
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ env.VERSION }}
          name: App v${{ env.VERSION }}
          body: |
            ## SideQuest App v${{ env.VERSION }}

            **SHA256:** `${{ env.APP_SHA256 }}`

            **Download:**
            ```
            https://get.trysidequest.ai/SideQuestApp-${{ env.VERSION }}.dmg
            ```

            **Verify integrity:**
            ```bash
            shasum -a 256 SideQuestApp-${{ env.VERSION }}.dmg
            # Should match: ${{ env.APP_SHA256 }}
            ```

            **Installation:**
            ```bash
            curl -fsSL https://get.trysidequest.ai/install.sh | bash
            ```

            Or in Claude Code:
            ```
            /sidequest:sq-update
            ```
          draft: false
          prerelease: false
          files: |
            SideQuestApp-${{ env.VERSION }}.dmg
